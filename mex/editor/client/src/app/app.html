<main class="main">
  <div>
    <h1>Hello, {{ title() }}</h1>
    <p>Congratulations! Your app is running. 🎉</p>
  </div>
  <div>
    <div>DATA:</div>
    @for (item of data$ | async; track item.title) {
      <li>
        <b>{{ item.title }}</b
        ><br />{{ item.text }}
      </li>
    } @empty {
      <li>There are no items.</li>
    }
  </div>
</main>
<router-outlet />
